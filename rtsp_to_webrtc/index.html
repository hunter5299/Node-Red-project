<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频协议 WebRTC 播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            text-align: center;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #e94560;
        }

        .header p {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 960px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .video-wrapper video {
            width: 100%;
            display: block;
            background: #000;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
        }

        .overlay-content {
            text-align: center;
        }

        .overlay-content .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .overlay-content p {
            font-size: 16px;
            color: #ccc;
        }

        .status-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
        }

        .status-dot.connecting {
            background: #ffaa00;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.6);
            animation: pulse 1s ease-in-out infinite;
        }

        .status-dot.error {
            background: #ff4444;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
        }

        .btn-start:hover {
            background: linear-gradient(135deg, #ff5a75, #e94560);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #333, #444);
            color: white;
        }

        .btn-stop:hover {
            background: linear-gradient(135deg, #444, #555);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .info-panel {
            width: 100%;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid #333;
        }

        .info-panel h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .info-panel .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid #222;
        }

        .info-panel .info-row:last-child {
            border-bottom: none;
        }

        .info-panel .info-label {
            color: #888;
        }

        .info-panel .info-value {
            color: #e94560;
            font-family: 'Consolas', monospace;
        }

        .log-panel {
            width: 100%;
            background: #111;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #333;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-panel h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .log-entry {
            font-size: 12px;
            font-family: 'Consolas', monospace;
            padding: 2px 0;
            color: #aaa;
        }

        .log-entry.error {
            color: #ff4444;
        }

        .log-entry.success {
            color: #00ff88;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #555;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 视频协议 WebRTC 播放器</h1>
    </div>

    <div class="container">
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay" id="overlay">
                <div class="overlay-content">
                    <div class="spinner" id="spinner" style="display:none;"></div>
                    <p id="overlayText">点击"开始播放"连接视频流</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">未连接</span>
            </div>
            <button class="fullscreen-btn" id="fullscreenBtn" title="全屏">⛶</button>
        </div>

        <div class="controls">
            <div style="display:flex; gap:8px; width:100%; max-width:700px; flex-wrap:wrap;">
                <select id="protocolSelect" onchange="onProtocolChange()"
                    style="padding:10px 14px; border-radius:8px; border:1px solid #444; background:#1a1a2e; color:#e94560; font-size:14px; min-width:120px; cursor:pointer;">
                    <option value="">自动检测</option>
                    <option value="rtsp">RTSP</option>
                    <option value="onvif">ONVIF</option>
                    <option value="gb28181">GB/T 28181</option>
                    <option value="rtmp">RTMP</option>
                    <option value="hls">HLS</option>
                </select>
                <input type="text" id="sourceInput" 
                    value="rtsp://admin:admin@192.168.42.1:554/live" 
                    placeholder="输入视频流地址"
                    style="flex:1; min-width:300px; padding:10px 14px; border-radius:8px; border:1px solid #444; background:#1a1a2e; color:#fff; font-size:14px; font-family:'Consolas',monospace;">
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn btn-start" id="startBtn" onclick="startStream()">
                    ▶ 开始播放
                </button>
                <button class="btn btn-stop" id="stopBtn" onclick="stopStream()" disabled>
                    ⏹ 停止播放
                </button>
            </div>
        </div>

        <div class="info-panel">
            <h3>📊 流信息</h3>
            <div class="info-row">
                <span class="info-label">视频流地址</span>
                <span class="info-value" id="rtspUrl">rtsp://admin:****@192.168.42.1:554/live</span>
            </div>
            <div class="info-row">
                <span class="info-label">连接状态</span>
                <span class="info-value" id="connState">未连接</span>
            </div>
            <div class="info-row">
                <span class="info-label">ICE 连接状态</span>
                <span class="info-value" id="iceState">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">视频分辨率</span>
                <span class="info-value" id="resolution">-</span>
            </div>
        </div>

        <div class="log-panel" id="logPanel">
            <h3>📋 日志</h3>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        let pc = null;
        let videoElement = document.getElementById('video');
        let startBtn = document.getElementById('startBtn');
        let stopBtn = document.getElementById('stopBtn');
        let overlay = document.getElementById('overlay');
        let overlayText = document.getElementById('overlayText');
        let spinner = document.getElementById('spinner');
        let statusDot = document.getElementById('statusDot');
        let statusText = document.getElementById('statusText');
        let connState = document.getElementById('connState');
        let iceState = document.getElementById('iceState');
        let resolution = document.getElementById('resolution');

        function addLog(message, type = '') {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (type ? ' ' + type : '');
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logContent.appendChild(entry);
            const logPanel = document.getElementById('logPanel');
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function setStatus(state) {
            statusDot.className = 'status-dot';
            switch (state) {
                case 'connecting':
                    statusDot.classList.add('connecting');
                    statusText.textContent = '连接中...';
                    connState.textContent = '连接中...';
                    break;
                case 'connected':
                    statusDot.classList.add('connected');
                    statusText.textContent = '已连接';
                    connState.textContent = '已连接';
                    break;
                case 'error':
                    statusDot.classList.add('error');
                    statusText.textContent = '连接失败';
                    connState.textContent = '连接失败';
                    break;
                default:
                    statusText.textContent = '未连接';
                    connState.textContent = '未连接';
            }
        }

        function showOverlay(show, text) {
            if (show) {
                overlay.classList.remove('hidden');
                overlayText.textContent = text || '';
            } else {
                overlay.classList.add('hidden');
            }
        }

        // Protocol-specific URL templates
        const protocolTemplates = {
            '': '',
            'rtsp': 'rtsp://admin:admin@192.168.42.1:554/live',
            'onvif': 'http://192.168.42.1:80/onvif/device_service',
            'gb28181': 'sip:34020000001320000001@192.168.1.1',
            'rtmp': 'rtmp://server/live/stream',
            'hls': 'http://server/live/stream.m3u8',
        };

        function onProtocolChange() {
            const protocol = document.getElementById('protocolSelect').value;
            const input = document.getElementById('sourceInput');
            if (protocolTemplates[protocol] !== undefined && protocolTemplates[protocol] !== '') {
                input.value = protocolTemplates[protocol];
                input.placeholder = `输入 ${protocol.toUpperCase()} 地址`;
            }
        }

        async function startStream() {
            try {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                spinner.style.display = 'block';
                showOverlay(true, '正在连接视频流...');
                setStatus('connecting');
                addLog('开始建立 WebRTC 连接...', 'success');

                // Create RTCPeerConnection
                pc = new RTCPeerConnection({
                    iceServers: []
                });

                // Add transceiver to receive video (recvonly)
                pc.addTransceiver('video', { direction: 'recvonly' });
                addLog('已添加视频接收器 (recvonly)');

                // Handle ICE connection state changes
                pc.oniceconnectionstatechange = () => {
                    iceState.textContent = pc.iceConnectionState;
                    addLog(`ICE 状态: ${pc.iceConnectionState}`);
                    
                    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                        setStatus('connected');
                        showOverlay(false);
                        addLog('WebRTC 连接成功！', 'success');
                    } else if (pc.iceConnectionState === 'failed') {
                        setStatus('error');
                        showOverlay(true, '连接失败，请检查 RTSP 流是否可用');
                        addLog('ICE 连接失败', 'error');
                    } else if (pc.iceConnectionState === 'disconnected') {
                        setStatus('connecting');
                        showOverlay(true, '连接断开，尝试重连...');
                        addLog('ICE 连接断开', 'error');
                    }
                };

                // Handle incoming tracks
                pc.ontrack = (event) => {
                    addLog('收到视频轨道', 'success');
                    videoElement.srcObject = event.streams[0];
                    
                    // Detect resolution
                    videoElement.onloadedmetadata = () => {
                        const w = videoElement.videoWidth;
                        const h = videoElement.videoHeight;
                        resolution.textContent = `${w} x ${h}`;
                        addLog(`视频分辨率: ${w}x${h}`, 'success');
                    };
                };

                // Create offer
                addLog('创建 SDP Offer...');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Get source URL and protocol from input
                const sourceUrl = document.getElementById('sourceInput').value.trim();
                if (!sourceUrl) {
                    throw new Error('请输入视频流地址');
                }

                const protocol = document.getElementById('protocolSelect').value;
                const protoLabel = protocol ? protocol.toUpperCase() : '自动检测';
                
                // Mask password in display
                const maskedUrl = sourceUrl.replace(/:([^@]+)@/, ':****@');
                document.getElementById('rtspUrl').textContent = `${maskedUrl} (${protoLabel})`;

                // Send offer to server and get answer
                addLog(`发送 Offer 到服务器 (协议: ${protoLabel})...`);
                const response = await fetch('/offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type,
                        sourceUrl: sourceUrl,
                        protocol: protocol || undefined
                    })
                });

                if (!response.ok) {
                    throw new Error(`服务器返回错误: ${response.status}`);
                }

                const answer = await response.json();

                if (answer.error) {
                    throw new Error(answer.error);
                }

                addLog('收到 SDP Answer，设置远端描述...');
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                addLog('WebRTC 协商完成，等待媒体流...');

            } catch (error) {
                addLog(`错误: ${error.message}`, 'error');
                setStatus('error');
                showOverlay(true, `连接失败: ${error.message}`);
                spinner.style.display = 'none';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                
                if (pc) {
                    pc.close();
                    pc = null;
                }
            }
        }

        function stopStream() {
            addLog('停止播放');
            if (pc) {
                pc.close();
                pc = null;
            }
            videoElement.srcObject = null;
            setStatus('');
            showOverlay(true, '点击"开始播放"连接视频流');
            spinner.style.display = 'none';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            iceState.textContent = '-';
            resolution.textContent = '-';
        }

        // Fullscreen button
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            const wrapper = document.getElementById('videoWrapper');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                wrapper.requestFullscreen();
            }
        });

        // Initial log
        addLog('页面加载完成，等待用户操作...');
    </script>
</body>
</html>
